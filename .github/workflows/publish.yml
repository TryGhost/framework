name: Publish

on:
  push:
    branches:
      - main
    paths:
      - 'packages/*/package.json'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Preview what would be published without actually publishing'
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    # Run for ship/version commits or manual dispatch.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'Published new versions')

    permissions:
      id-token: write
      contents: read

    env:
      FORCE_COLOR: 1
      NODE_OPTIONS: '--max_old_space_size=8192'
      CI: true
      IS_SHIPPING: true
      NPM_CONFIG_PROVENANCE: true
      NPM_CONFIG_REGISTRY: 'https://registry.npmjs.org'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-publish-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-publish-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-publish-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build releasable packages
        run: pnpm nx run-many -t build

      - name: Configure npm registry
        run: |
          cat > "$HOME/.npmrc" <<EOF
          registry=https://registry.npmjs.org/
          @tryghost:registry=https://registry.npmjs.org/
          EOF
          npm config get registry
          npm config get @tryghost:registry

      - name: Determine packages to publish
        id: pubs
        run: |
          to_publish=()
          for pkg in packages/*/package.json; do
            name=$(jq -r .name "$pkg")
            version=$(jq -r .version "$pkg")
            if [ -n "$(npm view "$name@$version" version 2>/dev/null)" ]; then
              echo "skip $name@$version (already published)"
            else
              echo "queue $name@$version"
              to_publish+=("$name")
            fi
          done
          if [ ${#to_publish[@]} -eq 0 ]; then
            echo "nothing to publish"
            echo "projects=" >> "$GITHUB_OUTPUT"
          else
            (IFS=,; echo "projects=${to_publish[*]}") >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.pubs.outputs.projects != ''
        run: npx nx release publish --projects=${{ steps.pubs.outputs.projects }} ${{ (github.event.inputs['dry-run'] == 'true' && '--dry-run') || '' }}

      - uses: tryghost/actions/actions/slack-build@a23d8b69227de37d6a5cde697783181d4d2defc4 # main
        if: failure()
        with:
          status: ${{ job.status }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
